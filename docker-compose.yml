version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ecommerce
      DB_USERNAME: ecommerce_user
      DB_PASSWORD: ecommerce_password
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    networks:
      - ecommerce_network

  web:
    image: nginx:alpine
    container_name: ecommerce_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ecommerce_network

  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ecommerce_network

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ecommerce_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_queue
    restart: unless-stopped
    command: php artisan queue:work redis --tries=3 --timeout=90
    volumes:
      - .:/var/www
    depends_on:
      - app
      - redis
    networks:
      - ecommerce_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: ecommerce_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge

volumes:
  db_data:
    driver: local
